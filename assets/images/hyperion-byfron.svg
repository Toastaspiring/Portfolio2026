<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#4493f8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4493f8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fenetre de lancement -->
  <rect width="1040" height="560" fill="#0a0a0c"/>
  <rect x="0.5" y="0.5" width="1039" height="559" fill="none" stroke="#1e1e24"/>

  <!-- lueur derriere le bouclier -->
  <rect x="0" y="40" width="1040" height="430" fill="url(#glow)"/>

  <!-- barre de titre -->
  <rect x="0" y="0" width="1040" height="52" fill="#111114"/>
  <line x1="0" y1="52" x2="1040" y2="52" stroke="#1e1e24"/>

  <!-- logo Byfron, coin haut-gauche (comme au demarrage reel) -->
  <g transform="translate(24,14)">
    <path d="M12 2 L21 7 V17 L12 22 L3 17 V7 Z" fill="none" stroke="#4493f8" stroke-width="1.6"/>
    <path d="M9.4 12.4 l2 2 l3.4 -4" fill="none" stroke="#4493f8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="21" fill="#e8e8ec" font-size="17" font-weight="600" letter-spacing="0.4">Byfron</text>
  </g>
  <!-- faux boutons fenetre -->
  <circle cx="982" cy="26" r="5" fill="#2a2a30"/>
  <circle cx="1006" cy="26" r="5" fill="#2a2a30"/>

  <!-- grand bouclier central -->
  <g transform="translate(460,132)">
    <path d="M60 0 L118 22 L118 80 C118 122 60 152 60 152 C60 152 2 122 2 80 L2 22 Z"
          fill="#4493f8" fill-opacity="0.10" stroke="#4493f8" stroke-width="2.4"/>
    <path d="M38 78 l15 16 l30 -35" fill="none" stroke="#4493f8" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- textes -->
  <text x="520" y="338" text-anchor="middle" fill="#ececf0" font-size="23" font-weight="600">Vérification de l'intégrité du client</text>
  <text x="520" y="370" text-anchor="middle" fill="#8b8b93" font-size="15">Hyperion analyse le process en mémoire avant de laisser Roblox démarrer</text>

  <!-- barre de progression -->
  <rect x="360" y="410" width="320" height="6" rx="3" fill="#17171c"/>
  <rect x="360" y="410" width="196" height="6" rx="3" fill="#4493f8" fill-opacity="0.55"/>
  <rect x="520" y="410" width="36" height="6" rx="3" fill="#7db4fb"/>

  <text x="520" y="452" text-anchor="middle" fill="#55555e" font-size="12.5" letter-spacing="0.4">anti-tamper actif, injection bloquée</text>
</svg>
